[tools]
# Languages
node = 'lts'
pnpm = "10.33"
python = ['3.10', '3.11', '3.12', '3.13']
rust = 'stable'
terraform = 'latest'
go = "latest"

# Python tools
uv = "latest"
"pipx:httpie" = "latest"
"pipx:ipython" = "latest"
"aqua:duckdb/duckdb" = "latest"

# Dev tools
"aqua:noborus/ov" = "latest"  # Terminal pager
jq = 'latest'
fzf = 'latest'
pre-commit = "latest"
gh = "latest"
shellcheck = "latest"
'aqua:mikefarah/yq' = "latest"
#awscli = "latest"

# Data tools
clickhouse = "latest"

# Utilities
"github:orf/trash" = "latest"
"github:go-task/task" = "latest"

# K8s / Docker stuff
'aqua:kubernetes/kubernetes/kubectl' = "latest"
stern = "latest"
kubectx = "latest"
'aqua:derailed/k9s' = "latest"
helm = "latest"
'aqua:wagoodman/dive' = "latest"

# Go stuff
"github:golangci/golangci-lint" = "latest"

# Rust dev tools
"cargo:eza" = "latest"
"cargo:bat" = "latest"
"cargo:fd-find" = "latest"
"cargo:tokei" = "latest"
"cargo:ripgrep" = "latest"
"cargo:tealdeer" = "latest"
"cargo:xsv" = "latest"
"cargo:hexyl" = "latest"
"cargo:hyperfine" = "latest"
"cargo:git-delta" = "latest"
"cargo:cargo-release" = "latest"
"cargo:samply" = "latest"
"cargo:parquet" = { version = "latest", features = "cli" }

# Cargo dev tools
"cargo:cargo-bloat" = "latest"
"cargo:cargo-watch" = "latest"
"cargo:cargo-outdated" = "latest"
"cargo:cargo-expand" = "latest"

# Useful utils
glow = "latest"

[settings]
cache_prune_age = "7d"
lockfile = false

[settings.status]
show_tools = false
missing_tools = "never"

[settings.pipx]
uvx = true
